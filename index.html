<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Control de Comidas - CVM PIM III</title>
<style>
:root{--azul:#185FA5;--azulbg:#E6F1FB;--ambar:#854F0B;--ambarbg:#FAEEDA;--verde:#27500A;--verdebg:#EAF3DE;--rojo:#A32D2D;--rojobg:#FCEBEB;--gris:#5F5E5A;--grisbg:#F1EFE8;--borde:#D3D1C7;--texto:#2C2C2A;}
*{box-sizing:border-box;margin:0;padding:0;}
body{font-family:Arial,Helvetica,sans-serif;color:var(--texto);background:#F7F6F2;font-size:14px;line-height:1.5;}
.topbar{background:var(--azul);color:#fff;padding:10px 16px;display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:8px;}
.topbar h1{font-size:16px;font-weight:bold;}
.topbar .sub{font-size:11px;opacity:.85;}
.userbox{display:flex;gap:10px;align-items:center;font-size:12px;}
.userbox button{background:rgba(255,255,255,.15);color:#fff;border:1px solid rgba(255,255,255,.3);padding:5px 10px;border-radius:6px;font-size:12px;cursor:pointer;}
.rolebadge{background:#fff;color:var(--azul);padding:3px 10px;border-radius:10px;font-weight:bold;}
.wrap{max-width:1100px;margin:0 auto;padding:14px;}
.tabs{display:flex;gap:6px;margin-bottom:14px;flex-wrap:wrap;border-bottom:1px solid var(--borde);}
.tabs button{background:none;border:none;padding:10px 14px;font-size:13px;cursor:pointer;color:var(--gris);border-bottom:2px solid transparent;}
.tabs button.active{color:var(--azul);border-bottom-color:var(--azul);font-weight:bold;}
.tabs button:disabled{opacity:.35;cursor:not-allowed;}
.card{background:#fff;border:1px solid var(--borde);border-radius:10px;padding:16px;margin-bottom:14px;}
.kpis{display:grid;grid-template-columns:repeat(auto-fit,minmax(130px,1fr));gap:10px;margin-bottom:14px;}
.kpi{background:var(--grisbg);border-radius:8px;padding:12px;}
.kpi .l{font-size:11px;color:var(--gris);}
.kpi .v{font-size:24px;font-weight:bold;}
.bar{display:flex;gap:8px;align-items:center;flex-wrap:wrap;margin-bottom:12px;}
.bar label{font-size:12px;color:var(--gris);}
select,input[type=text],input[type=date],input[type=number],input[type=password],input[type=email]{padding:7px 9px;border:1px solid var(--borde);border-radius:6px;font-size:13px;font-family:inherit;}
.mealbtn{padding:6px 12px;border:1px solid var(--borde);background:#fff;border-radius:6px;font-size:12px;cursor:pointer;}
.mealbtn.active{background:var(--azulbg);color:var(--azul);border-color:var(--azul);font-weight:bold;}
button.act{padding:7px 12px;border:1px solid var(--borde);background:#fff;border-radius:6px;font-size:13px;cursor:pointer;}
button.act:hover{background:var(--grisbg);}
button.prim{background:var(--azul);color:#fff;border-color:var(--azul);}
button.prim:hover{background:#0C447C;}
table{width:100%;border-collapse:collapse;font-size:12px;}
th{background:var(--azul);color:#fff;padding:8px 6px;text-align:left;font-weight:bold;position:sticky;top:0;}
td{padding:6px;border-bottom:1px solid #eee;}
tr:hover td{background:#fafafa;}
.tablewrap{max-height:440px;overflow:auto;border:1px solid var(--borde);border-radius:8px;}
.pill{display:inline-block;font-size:10px;padding:2px 7px;border-radius:10px;font-weight:bold;}
.p-conf{background:var(--verdebg);color:var(--verde);}
.p-noc{background:var(--ambarbg);color:var(--ambar);}
.p-sin{background:var(--rojobg);color:var(--rojo);}
.p-ev{background:var(--azulbg);color:var(--azul);}
.chk{width:18px;height:18px;cursor:pointer;}
.banner{padding:8px 12px;border-radius:6px;font-size:12px;margin-bottom:12px;}
.banner.rrhh{background:var(--azulbg);color:var(--azul);}
.banner.contrata{background:var(--ambarbg);color:var(--ambar);}
.obs{width:100%;padding:4px 6px;border:1px solid var(--borde);border-radius:4px;font-size:11px;font-family:inherit;}
.muted{color:var(--gris);font-size:11px;}
.danger{color:var(--rojo);}
.hidden{display:none !important;}
h2{font-size:15px;margin-bottom:10px;}
.evrow{display:grid;grid-template-columns:1.4fr 1fr auto;gap:8px;margin-bottom:8px;}
.note{font-size:11px;color:var(--gris);background:var(--grisbg);padding:8px 10px;border-radius:6px;margin-top:8px;}
.syncing{font-size:11px;color:var(--gris);}
/* login */
#login{position:fixed;inset:0;background:#F7F6F2;display:flex;align-items:center;justify-content:center;z-index:100;}
.loginbox{background:#fff;border:1px solid var(--borde);border-radius:12px;padding:28px;width:340px;max-width:90vw;}
.loginbox h1{font-size:18px;color:var(--azul);margin-bottom:4px;}
.loginbox .sub{font-size:12px;color:var(--gris);margin-bottom:18px;}
.loginbox label{font-size:12px;color:var(--gris);display:block;margin:10px 0 4px;}
.loginbox input{width:100%;}
.loginbox button{width:100%;margin-top:18px;padding:10px;}
.loginerr{color:var(--rojo);font-size:12px;margin-top:10px;min-height:16px;}
</style>
</head>
<body>

<div id="login">
  <div class="loginbox">
    <h1>Control de Comidas</h1>
    <div class="sub">CVM PIM III Choco-Isidora</div>
    <label>Correo</label>
    <input type="email" id="li-email" placeholder="usuario@cvm.com" autocomplete="username">
    <label>Contrase&ntilde;a</label>
    <input type="password" id="li-pass" placeholder="contrase&ntilde;a" autocomplete="current-password">
    <button class="act prim" onclick="doLogin()">Entrar</button>
    <div class="loginerr" id="li-err"></div>
  </div>
</div>

<div id="app" class="hidden">
<div class="topbar">
  <div><h1>Control de Entregas de Comidas</h1><div class="sub">CVM PIM III Choco-Isidora</div></div>
  <div class="userbox">
    <span id="u-email"></span>
    <span class="rolebadge" id="u-rol"></span>
    <span class="syncing" id="sync"></span>
    <button onclick="doLogout()">Salir</button>
  </div>
</div>
<div class="wrap">
  <div id="banner-rrhh" class="banner rrhh">Modo RRHH &mdash; control total: autoriza la lista, define comidas, agrega eventuales/seguridad y consolida.</div>
  <div id="banner-contrata" class="banner contrata hidden">Modo Contrata &mdash; solo puedes marcar Entregado y dejar observacion.</div>

  <div class="tabs">
    <button id="t-auth" class="active" onclick="tab('auth')">1 &middot; Autorizar lista</button>
    <button id="t-solicitudes" onclick="tab('solicitudes')">Solicitudes</button>
    <button id="t-cargadiaria" onclick="tab('cargadiaria')">Carga diaria</button>
    <button id="t-resumendiario" onclick="tab('resumendiario')">Resumen diario</button>
    <button id="t-manuales" onclick="tab('manuales')">Planillas manuales</button>
    <button id="t-entrega" onclick="tab('entrega')">2 &middot; Entrega</button>
    <button id="t-concilia" onclick="tab('concilia')">3 &middot; Conciliacion</button>
    <button id="t-cierre" onclick="tab('cierre')">Cierre mensual</button>
    <button id="t-personal" onclick="tab('personal')">Personal (ingresos/egresos)</button>
  </div>

  <div class="bar" id="topbar-filtros">
    <label>Fecha</label><input type="date" id="fecha" onchange="onDateChange()">
    <label>Comida</label>
    <button class="mealbtn" data-m="Desayuno" onclick="setMeal('Desayuno')">Desayuno</button>
    <button class="mealbtn active" data-m="Almuerzo" onclick="setMeal('Almuerzo')">Almuerzo</button>
    <button class="mealbtn" data-m="Cena" onclick="setMeal('Cena')">Cena</button>
    <label style="margin-left:auto;">Planta</label>
    <select id="fplanta" onchange="render()"><option value="">Todas</option><option>CHOCO</option><option>ISIDORA</option></select>
    <select id="fger" onchange="render()"><option value="">Todas las gerencias</option></select>
  </div>

  <div id="view-auth"></div>
  <div id="view-solicitudes" class="hidden"></div>
  <div id="view-cargadiaria" class="hidden"></div>
  <div id="view-resumendiario" class="hidden"></div>
  <div id="view-manuales" class="hidden"></div>
  <div id="view-entrega" class="hidden"></div>
  <div id="view-concilia" class="hidden"></div>
  <div id="view-eventuales" class="hidden"></div>
  <div id="view-seguridad" class="hidden"></div>
  <div id="view-cierre" class="hidden"></div>
  <div id="view-personal" class="hidden"></div>
</div>
</div>

<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-auth-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-database-compat.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf-autotable/3.8.2/jspdf.plugin.autotable.min.js"></script>
<script src="firebase-config.js"></script>
<script src="nomina-data.js"></script>
<script>
const COL={ced:0,nom:1,ger:2,grupo:3,fam:4,planta:5,mask:6};
const MEALBIT={Desayuno:1,Almuerzo:2,Cena:4};
const ORGANISMOS=['Guardia Nacional','DGCIM','GPAMO','Escuela DGCIM'];
// NOMINA ahora se carga desde Firebase (nodo /nomina). Si Firebase esta vacio,
// usa NOMINA_RAW del archivo como respaldo. cargarNomina() se llama al iniciar sesion.
let NOMINA = NOMINA_RAW.map(a=>({ced:a[0],nom:a[1],ger:a[2],grupo:a[3],fam:a[4],planta:a[5],mask:a[6]}));

function cargarNomina(){
  return db.ref('nomina').get().then(snap=>{
    if(snap.exists()){
      const data=snap.val();
      NOMINA=Object.keys(data).filter(ced=>data[ced].activo!==false).map(ced=>({
        ced:ced,
        nom:data[ced].nom,
        ger:data[ced].grupo,          // el "grupo solicitante" ocupa el lugar de 'ger' (compatibilidad)
        grupo:data[ced].rot,          // grupo rotativo
        fam:data[ced].tipo||'',
        planta:data[ced].planta,
        mask:data[ced].mask
      }));
      console.log('Nomina cargada desde Firebase: '+NOMINA.length+' activos');
    }else{
      console.log('Firebase sin nomina; usando NOMINA_RAW del archivo ('+NOMINA.length+')');
    }
  }).catch(e=>{
    console.warn('No se pudo cargar nomina de Firebase, se usa el archivo:', e.message);
  });
}

let ROLE=null, GRUPO='', MEAL='Almuerzo', TAB='auth';
let CUR={auth:{},entregado:{},obs:{},eventuales:[],seguridad:{},excluidos:{}};  // estado del dia+comida actual (sincronizado con Firebase)
let curRef=null;       // referencia firebase del dia+comida actual
const today=new Date().toISOString().slice(0,10);

// ---------- AUTENTICACION ----------
function doLogin(){
  const e=document.getElementById('li-email').value.trim();
  const p=document.getElementById('li-pass').value;
  document.getElementById('li-err').textContent='';
  auth.signInWithEmailAndPassword(e,p).catch(err=>{
    document.getElementById('li-err').textContent='Correo o contrasena incorrectos.';
  });
}
function doLogout(){auth.signOut();}

auth.onAuthStateChanged(user=>{
  if(user){
    db.ref('usuarios/'+user.uid).get().then(snap=>{
      const info=snap.exists()?snap.val():{};
      ROLE=info.rol||'CONTRATA';
      GRUPO=info.grupo||'';   // gerencia del solicitante (vacio para RRHH/CONTRATA)
      document.getElementById('u-email').textContent=user.email;
      document.getElementById('u-rol').textContent=ROLE+(GRUPO?(' \u00b7 '+GRUPO):'');
      document.getElementById('login').classList.add('hidden');
      document.getElementById('app').classList.remove('hidden');
      // Cargar nomina desde Firebase ANTES de renderizar las listas
      cargarNomina().then(()=>{
        applyRole();
        document.getElementById('fecha').value=today;
        gerOptions();
        bindDay();
      });
    });
  }else{
    ROLE=null;
    document.getElementById('app').classList.add('hidden');
    document.getElementById('login').classList.remove('hidden');
    if(curRef){curRef.off();curRef=null;}
  }
});

// Define que pestañas ve cada rol y a que pestaña entra por defecto.
const TABS_POR_ROL={
  RRHH:        ['auth','solicitudes','cargadiaria','resumendiario','manuales','entrega','concilia','cierre','personal'],
  CONTRATA:    ['solicitudes','entrega','cierre'],   // la contrata tambien ve las solicitudes aprobadas
  SOLICITANTE: ['auth']
};
const TAB_INICIAL={RRHH:'auth', CONTRATA:'entrega', SOLICITANTE:'auth'};

function rolPuedeVer(t){
  const permitidas=TABS_POR_ROL[ROLE]||TABS_POR_ROL.CONTRATA;
  return permitidas.indexOf(t)!==-1;
}

function applyRole(){
  const permitidas=TABS_POR_ROL[ROLE]||TABS_POR_ROL.CONTRATA;
  // Mostrar/ocultar cada boton de pestaña segun el rol
  ['auth','solicitudes','cargadiaria','resumendiario','manuales','entrega','concilia','cierre','personal'].forEach(t=>{
    const btn=document.getElementById('t-'+t);
    if(!btn)return;
    const visible=permitidas.indexOf(t)!==-1;
    btn.style.display=visible?'':'none';
    btn.disabled=!visible;
  });
  // Renombrar la pestaña "Autorizar lista" para el solicitante (para el es "Solicitar comidas")
  const tAuth=document.getElementById('t-auth');
  if(tAuth){
    if(ROLE==='SOLICITANTE')tAuth.innerHTML='Solicitar comidas de mi gerencia';
    else tAuth.innerHTML='1 &middot; Autorizar lista';
  }
  // Banners
  document.getElementById('banner-rrhh').classList.toggle('hidden', ROLE!=='RRHH');
  const bc=document.getElementById('banner-contrata');
  if(ROLE==='CONTRATA'){
    bc.classList.remove('hidden');
    bc.innerHTML='Modo Contrata &mdash; solo puedes marcar Entregado y dejar observacion. El Cierre mensual es de solo lectura.';
  }else if(ROLE==='SOLICITANTE'){
    bc.classList.remove('hidden');
    bc.className='banner rrhh';
    bc.innerHTML='Modo Solicitante &mdash; '+GRUPO+'. Solicita las comidas del personal de tu gerencia para el dia siguiente.';
  }else{
    bc.classList.add('hidden');
  }
  // Filtro de gerencia: el solicitante queda fijo en su gerencia y no puede cambiarlo
  const selGer=document.getElementById('fger');
  const selPlanta=document.getElementById('fplanta');
  const barra=document.getElementById('topbar-filtros');
  if(ROLE==='SOLICITANTE'){
    if(selGer){selGer.value=GRUPO; selGer.disabled=true; selGer.style.display='none';}
    if(selPlanta){selPlanta.style.display='none';}
    if(barra){barra.style.display='none';}   // el solicitante no usa la barra de comida/fecha
    // fecha automatica = manana (dia siguiente)
    const man=new Date();man.setDate(man.getDate()+1);
    const f=document.getElementById('fecha');if(f)f.value=man.toISOString().slice(0,10);
  }else{
    if(selGer){selGer.disabled=false; selGer.style.display='';}
    if(selPlanta){selPlanta.style.display='';}
    if(barra){barra.style.display='';}
  }
  tab(TAB_INICIAL[ROLE]||'entrega');
}

// ---------- SINCRONIZACION CON FIREBASE ----------
function dayKey(){return document.getElementById('fecha').value+'_'+MEAL;}
function emptyDay(){return {auth:{},entregado:{},obs:{},eventuales:[],seguridad:{},excluidos:{}};}

function bindDay(){
  if(curRef)curRef.off();
  const k=dayKey();
  curRef=db.ref('dias/'+k);
  setSync('cargando...');
  curRef.on('value',snap=>{
    const v=snap.val()||{auth:{},entregado:{},obs:{},eventuales:[],seguridad:{},excluidos:{}};
    CUR={
      auth:v.auth||{}, entregado:v.entregado||{}, obs:v.obs||{},
      eventuales:v.eventuales||[], seguridad:v.seguridad||{}, excluidos:v.excluidos||{}
    };
    setSync('sincronizado');
    render();
  });
}
function setSync(t){document.getElementById('sync').textContent=t;}

// helpers de escritura segun rol (las reglas de Firebase tambien lo protegen)
function wAuth(obj){db.ref('dias/'+dayKey()+'/auth').set(obj);}
function wExcl(obj){db.ref('dias/'+dayKey()+'/excluidos').set(obj);}
function wEvent(arr){db.ref('dias/'+dayKey()+'/eventuales').set(arr);}
function wSeg(obj){db.ref('dias/'+dayKey()+'/seguridad').set(obj);}
function wEnt(ced,val){const r=db.ref('dias/'+dayKey()+'/entregado/'+ced);val?r.set(true):r.remove();}
function wObs(ced,val){const r=db.ref('dias/'+dayKey()+'/obs/'+ced);val?r.set(val):r.remove();}

// ---------- NAVEGACION ----------
function onDateChange(){bindDay();}
function setMeal(m){MEAL=m;document.querySelectorAll('.mealbtn').forEach(b=>b.classList.toggle('active',b.dataset.m===m));bindDay();}
function tab(t){
  // SEGURIDAD: si el rol no puede ver esta pestaña, se le manda a su pestaña inicial
  if(ROLE && !rolPuedeVer(t)){t=TAB_INICIAL[ROLE]||'entrega';}
  TAB=t;
  ['auth','solicitudes','cargadiaria','resumendiario','manuales','entrega','concilia','cierre','personal'].forEach(x=>{
    document.getElementById('view-'+x).classList.toggle('hidden',x!==t);
    const b=document.getElementById('t-'+x);if(b)b.classList.toggle('active',x===t);
  });
  render();
}
function elig(){return NOMINA.filter(p=>p.mask & MEALBIT[MEAL]);}
function filtered(){
  // SEGURIDAD: el solicitante SOLO ve el personal de su propia gerencia, pase lo que pase.
  if(ROLE==='SOLICITANTE'){
    return elig().filter(p=>p.ger===GRUPO);
  }
  const fp=document.getElementById('fplanta').value, fg=document.getElementById('fger').value;
  return elig().filter(p=>(!fp||p.planta===fp)&&(!fg||p.ger===fg));
}
function gerOptions(){
  const sel=document.getElementById('fger');
  const gers=[...new Set(NOMINA.map(p=>p.ger))].sort();
  sel.innerHTML='<option value="">Todas las gerencias</option>'+gers.map(g=>'<option>'+g+'</option>').join('');
}
function render(){
  if(!ROLE)return;
  if(TAB==='auth')renderAuth();
  if(TAB==='solicitudes')renderSolicitudes();
  if(TAB==='cargadiaria')renderCargaDiaria();
  if(TAB==='resumendiario')renderResumenDiario();
  if(TAB==='manuales')renderManuales();
  if(TAB==='entrega')renderEntrega();
  if(TAB==='concilia')renderConcilia();
  if(TAB==='eventuales')renderEventuales();
  if(TAB==='seguridad')renderSeguridad();
  if(TAB==='cierre')renderCierre();
  if(TAB==='personal')renderPersonal();
}

// ---------- 1. AUTORIZAR (RRHH) / SOLICITAR-VALIDAR (SOLICITANTE) ----------
function renderAuth(){
  if(!CUR||!CUR.excluidos||!CUR.auth){CUR=Object.assign({auth:{},entregado:{},obs:{},eventuales:[],seguridad:{},excluidos:{}},CUR||{});}
  if(ROLE==='SOLICITANTE'){renderSolicitante();return;}
  renderAuthRRHH();
}

// ===== VISTA DEL SOLICITANTE: 3 cuadros (Desayuno/Almuerzo/Cena) + escaner =====
const COMIDAS=['Desayuno','Almuerzo','Cena'];
let VAL={Desayuno:null,Almuerzo:null,Cena:null};   // resultado de validacion por comida
let ESCANER_DATA=null;                              // imagen comprimida (dataURL) del escaner
let SOL_FECHA=null;                                 // fecha de la solicitud (manana)

function fechaManana(){const d=new Date();d.setDate(d.getDate()+1);return d.toISOString().slice(0,10);}
function fechaBonita(f){const p=f.split('-');return p[2]+'/'+p[1]+'/'+p[0];}
// normaliza cedula: quita puntos, espacios, guiones y ceros a la izquierda, para comparar bien
function normCed(c){return String(c==null?'':c).replace(/[.\s\-]/g,'').replace(/^0+/,'');}

function renderSolicitante(){
  const v=document.getElementById('view-auth');
  let html='<div class="card"><h2>Solicitar comidas &mdash; '+GRUPO+'</h2>';
  html+='<div class="muted">Puedes subir solicitudes para cualquier fecha (planificaci&oacute;n anticipada), en el horario de 7:00 am a 4:00 pm. Indica la fecha de la planilla que subes.</div>';

  // PASO 0: fecha de la planilla
  html+='<div style="margin-top:14px;padding:12px;border:1px solid var(--borde);border-radius:8px;">';
  html+='<h3 style="margin:0 0 6px;color:var(--azul);">Fecha y tipo de planilla</h3>';
  html+='<div class="muted" style="margin-bottom:6px;">\u00bfPara qu&eacute; d&iacute;a es esta planilla?</div>';
  html+='<input type="date" id="sol-fecha" value="'+(SOL_FECHA||fechaManana())+'" min="'+today+'" onchange="onSolFecha()" style="padding:8px;">';
  html+='<div style="margin-top:10px;"><label style="font-weight:bold;">Tipo de planilla:</label> ';
  html+='<select id="sol-tipo" style="padding:6px;margin-left:6px;"><option value="Personal">Personal normal</option><option value="ParadaMolino">Parada de Molino SAG</option></select></div>';
  html+='</div>';

  // PASO 1: subir el escaner
  html+='<div style="margin-top:14px;padding:12px;border:1px solid var(--borde);border-radius:8px;">';
  html+='<h3 style="margin:0 0 6px;color:var(--azul);">Paso 1 &mdash; Sube el escaner de tu planilla</h3>';
  html+='<div class="muted" style="margin-bottom:8px;">Sube la foto o PDF de la planilla firmada. El sistema verificar&aacute; que est&eacute; legible antes de continuar.</div>';
  html+='<input type="file" id="file-escaner" accept="image/*,application/pdf" onchange="cargarEscaner(this)">';
  html+='<div id="escaner-preview" style="margin-top:10px;"></div>';
  html+='</div>';

  html+='<div id="paso2" style="margin-top:16px;"></div>';
  html+='<div id="mis-solicitudes" style="margin-top:20px;"></div>';
  html+='<div id="cancelaciones-sec" style="margin-top:20px;"></div>';
  v.innerHTML=html;
  if(!SOL_FECHA)SOL_FECHA=fechaManana();
  if(ESCANER_DATA){mostrarPreview();pintarPaso2();}
  renderMisSolicitudes();
  renderCancelaciones();
}

// ===== CANCELACIONES: reportar quien asistio pero no va a comer (almuerzo/cena) =====
function enVentanaCancelacion(){
  const ahora=new Date();const h=ahora.getHours()+ahora.getMinutes()/60;
  return h>=7 && h<=8.5;   // 7:00 am a 8:30 am
}
function renderCancelaciones(){
  const cont=document.getElementById('cancelaciones-sec');
  if(!cont)return;
  const hoy=today;
  const claveGer=GRUPO;
  cont.innerHTML='<div class="card"><h2>Cancelar comidas de hoy</h2><div class="muted">Cargando...</div></div>';
  db.ref('solicitudes/'+hoy+'/'+claveGer).get().then(snap=>{
    const enVentana=enVentanaCancelacion();
    let html='<div class="card"><h2>Cancelar comidas de hoy ('+hoy+')</h2>';
    html+='<div class="muted">Si un trabajador que S&Iacute; asisti&oacute; hoy no va a almorzar o cenar, rep&oacute;rtalo aqu&iacute; para que RRHH lo excluya. Ventana: 7:00 am a 8:30 am.</div>';
    if(!enVentana){
      html+='<div class="note" style="border-color:var(--rojo);margin-top:10px;">Fuera del horario de cancelaci&oacute;n (7:00 am a 8:30 am). No se pueden reportar cancelaciones ahora.</div>';
    }
    if(!snap.exists()){
      html+='<div class="note" style="margin-top:10px;">No hay una solicitud tuya cargada para hoy. Las cancelaciones aplican sobre la solicitud del d&iacute;a.</div>';
    }else if(enVentana){
      const s=snap.val();
      const canc=s.cancelaciones||{};
      html+='<div style="margin-top:12px;padding:10px;border:1px solid var(--borde);border-radius:8px;">';
      html+='<div style="display:grid;grid-template-columns:2fr 1fr 2fr auto;gap:8px;align-items:end;">';
      html+='<div><label style="font-size:12px;">C&eacute;dula del trabajador</label><input type="text" id="canc-ced" placeholder="C.I." style="width:100%;padding:6px;"></div>';
      html+='<div><label style="font-size:12px;">Comida</label><select id="canc-comida" style="width:100%;padding:6px;"><option value="Almuerzo">Almuerzo</option><option value="Cena">Cena</option></select></div>';
      html+='<div><label style="font-size:12px;">Observaci&oacute;n</label><input type="text" id="canc-obs" placeholder="Motivo (opcional)" style="width:100%;padding:6px;"></div>';
      html+='<button class="act prim" onclick="reportarCancelacion()">Reportar</button>';

        html+='<div class="tablewrap" style="margin-top:12px;"><table><thead><tr><th>C&eacute;dula</th><th>Nombre</th><th>Comida</th><th>Observaci&oacute;n</th><th>Estado</th></tr></thead><tbody>';
        Object.keys(canc).forEach(k=>{
          const c=canc[k];
          const est=c.confirmada?'<span style="color:var(--verde);">Excluido por RRHH</span>':'<span style="color:#b8860b;">Pendiente RRHH</span>';
          html+='<tr><td>'+c.ced+'</td><td>'+(c.nombre||'')+'</td><td>'+c.comida+'</td><td>'+(c.obs||'')+'</td><td>'+est+'</td></tr>';
        });
        html+='</tbody></table></div>';
      }
    }
    html+='</div>';
    cont.innerHTML=html;
  }).catch(e=>{cont.innerHTML='<div class="card"><div class="note danger">Error: '+e.message+'</div></div>';});
}
function reportarCancelacion(){
  const ced=(document.getElementById('canc-ced')||{}).value.trim();
  const comida=(document.getElementById('canc-comida')||{}).value;
  const obs=(document.getElementById('canc-obs')||{}).value.trim();
  if(!ced){alert('Escribe la cedula');return;}
  if(!enVentanaCancelacion()){alert('Fuera del horario de cancelacion (7:00 a 8:30 am).');return;}
  const persona=NOMINA.find(p=>normCed(p.ced)===normCed(ced));
  if(!persona){alert('La cedula '+ced+' no existe en la nomina.');return;}
  if(persona.ger!==GRUPO){alert('La cedula '+ced+' es de '+persona.ger+', no de tu gerencia.');return;}
  const hoy=today;const claveGer=GRUPO;
  const key='c_'+normCed(ced)+'_'+comida;
  const registro={ced:ced,nombre:persona.nom,comida:comida,obs:obs,
    reportadoPor:(auth.currentUser?auth.currentUser.email:''),
    reportado:new Date().toISOString(),confirmada:false};
  db.ref('solicitudes/'+hoy+'/'+claveGer+'/cancelaciones/'+key).set(registro)
    .then(()=>{alert('Cancelacion reportada. RRHH la confirmara para excluir.');renderCancelaciones();})
    .catch(e=>alert('Error: '+e.message));
}

// ===== Contratas externas (Gestion Administrativa) =====
let CONTRATAS=[];              // comidas del dia: [{nom, Desayuno, Almuerzo, Cena}]
let CONTRATAS_NOMBRES=null;    // lista de nombres registrados

function cargarNombresContratas(){
  // intenta leer de Firebase; si no hay, arranca con las dos por defecto
  db.ref('config/contratas').get().then(snap=>{
    if(snap.exists()){CONTRATAS_NOMBRES=snap.val();}
    else{CONTRATAS_NOMBRES=['Ferreobras','Serviplot'];}
    pintarNombresContratas();
    pintarContratas();
  }).catch(()=>{
    CONTRATAS_NOMBRES=['Ferreobras','Serviplot'];
    pintarNombresContratas();
    pintarContratas();
  });
}
function guardarNombresContratas(){
  db.ref('config/contratas').set(CONTRATAS_NOMBRES).catch(e=>console.log('No se guardo lista:',e.message));
}
function pintarNombresContratas(){
  const cont=document.getElementById('contratas-nombres');
  if(!cont)return;

  if(lista.length===0){cont.innerHTML='<span class="muted">Sin contratas registradas.</span>';return;}

  lista.forEach((n,i)=>{
    html+='<span style="display:inline-flex;align-items:center;gap:4px;background:#eef;border:1px solid #ccd;border-radius:14px;padding:3px 10px;margin:3px;">'+n+
      ' <a href="#" onclick="editarNombreContrata('+i+');return false;" style="text-decoration:none;" title="Editar">\u270e</a>'+
      ' <a href="#" onclick="eliminarNombreContrata('+i+');return false;" style="text-decoration:none;color:var(--rojo);" title="Eliminar">\u2715</a></span>';
  });
  cont.innerHTML=html;
}
function agregarNombreContrata(){
  const inp=document.getElementById('nueva-contrata');
  const n=(inp?inp.value:'').trim();
  if(!n){alert('Escribe el nombre');return;}
  CONTRATAS_NOMBRES=CONTRATAS_NOMBRES||[];
  if(CONTRATAS_NOMBRES.includes(n)){alert('Esa contrata ya existe');return;}
  CONTRATAS_NOMBRES.push(n);
  if(inp)inp.value='';
  guardarNombresContratas();pintarNombresContratas();pintarContratas();
}
function editarNombreContrata(i){
  const actual=CONTRATAS_NOMBRES[i];
  const nuevo=prompt('Nuevo nombre para "'+actual+'":',actual);
  if(nuevo===null)return;
  const nn=nuevo.trim();if(!nn)return;
  CONTRATAS_NOMBRES[i]=nn;
  guardarNombresContratas();pintarNombresContratas();pintarContratas();
}
function eliminarNombreContrata(i){
  if(!confirm('Eliminar la contrata "'+CONTRATAS_NOMBRES[i]+'"?'))return;
  CONTRATAS_NOMBRES.splice(i,1);
  guardarNombresContratas();pintarNombresContratas();pintarContratas();
}

function pintarContratas(){
  const cont=document.getElementById('contratas-lista');
  if(!cont)return;
  const nombres=CONTRATAS_NOMBRES||[];
  let html='<b style="font-size:13px;">Comidas del d&iacute;a por contrata</b>';
  html+='<div class="tablewrap" style="margin-top:6px;"><table><thead><tr><th>Contrata</th><th>Desayuno</th><th>Almuerzo</th><th>Cena</th></tr></thead><tbody>';
  nombres.forEach((n,i)=>{
    const ex=CONTRATAS.find(c=>c.nom===n)||{Desayuno:0,Almuerzo:0,Cena:0};
    html+='<tr><td>'+n+'</td>'+
      '<td><input type="number" min="0" value="'+ex.Desayuno+'" style="width:70px;" onchange="setContrata(\''+n.replace(/'/g,"")+'\',\'Desayuno\',this.value)"></td>'+
      '<td><input type="number" min="0" value="'+ex.Almuerzo+'" style="width:70px;" onchange="setContrata(\''+n.replace(/'/g,"")+'\',\'Almuerzo\',this.value)"></td>'+
      '<td><input type="number" min="0" value="'+ex.Cena+'" style="width:70px;" onchange="setContrata(\''+n.replace(/'/g,"")+'\',\'Cena\',this.value)"></td></tr>';
  });
  html+='</tbody></table></div>';

function setContrata(nom,comida,val){
  let c=CONTRATAS.find(x=>x.nom===nom);
  if(!c){c={nom,Desayuno:0,Almuerzo:0,Cena:0};CONTRATAS.push(c);}
  c[comida]=parseInt(val)||0;
}

function validarUnaComida(m){
  const txt=(document.getElementById('ced-'+m)||{value:''}).value;
  const lineas=txt.split(/[\n,;]+/).map(s=>s.replace(/[^0-9]/g,'').trim()).filter(s=>s.length>0);
  const vistas=new Set();const ced=[];
  lineas.forEach(c=>{if(!vistas.has(c)){vistas.add(c);ced.push(c);}});
  const idx={};NOMINA.forEach(p=>{idx[p.ced]=p;});
  const ok=[],errC=[],errG=[];
  ced.forEach(c=>{
    const p=idx[c];
    if(!p)errC.push(c);
    else if(p.ger!==GRUPO)errG.push({ced:c,nom:p.nom,ger:p.ger});
    else ok.push({ced:c,nom:p.nom,grupo:p.grupo});
  });
  return {ok,errC,errG,total:ced.length};
}

function validarTodas(){
  COMIDAS.forEach(m=>{VAL[m]=validarUnaComida(m);});
  pintarResultado();
}
function limpiarTodas(){VAL={Desayuno:null,Almuerzo:null,Cena:null};COMIDAS.forEach(m=>{const t=document.getElementById('ced-'+m);if(t)t.value='';});pintarResultado();}

function pintarResultado(){
  const cont=document.getElementById('val-resultado');
  if(!cont)return;
  const algo=VAL.Desayuno||VAL.Almuerzo||VAL.Cena;
  if(!algo){cont.innerHTML='';return;}
  let totErr=0,totOk=0;
  COMIDAS.forEach(m=>{if(VAL[m]){totErr+=VAL[m].errC.length+VAL[m].errG.length;totOk+=VAL[m].ok.length;}});
  let html='';
  html+='<div class="kpis">';
  COMIDAS.forEach(m=>{const r=VAL[m]||{ok:[],errC:[],errG:[]};html+='<div class="kpi"><div class="l">'+m+'</div><div class="v" style="color:var(--verde)">'+r.ok.length+'</div>'+((r.errC.length+r.errG.length)>0?'<div style="color:var(--rojo);font-size:12px;">'+(r.errC.length+r.errG.length)+' con error</div>':'')+'</div>';});
  html+='<div class="kpi" style="background:var(--azulbg);"><div class="l" style="color:var(--azul)">Total comidas</div><div class="v" style="color:var(--azul)">'+totOk+'</div></div>';
  html+='</div>';
  if(totErr>0){
    html+='<div class="note danger" style="margin-top:12px;"><b>PLANILLA MALA &mdash; corrige antes de subir el escaner:</b>';
    COMIDAS.forEach(m=>{
      const r=VAL[m];if(!r)return;
      if(r.errC.length+r.errG.length===0)return;
      html+='<div style="margin-top:6px;"><u>'+m+':</u><ul style="margin:4px 0 0 18px;">';
      r.errC.forEach(c=>{html+='<li>Cedula <b>'+c+'</b>: no existe (cedula mala).</li>';});
      r.errG.forEach(e=>{html+='<li>Cedula <b>'+e.ced+'</b> ('+e.nom+'): es de <b>'+e.ger+'</b>, no de '+GRUPO+'. Eventuales/visitas los carga RRHH.</li>';});
      html+='</ul></div>';
    });
    html+='</div>';
  }
  COMIDAS.forEach(m=>{
    const r=VAL[m];if(!r||r.ok.length===0)return;
    html+='<div style="margin-top:14px;"><h3 style="margin-bottom:6px;color:var(--azul);">'+m+' &mdash; '+r.ok.length+' trabajadores</h3>';
    html+='<div class="tablewrap"><table><thead><tr><th>Cedula</th><th>Nombre</th><th>Grupo</th></tr></thead><tbody>';
    r.ok.forEach(p=>{html+='<tr><td>'+p.ced+'</td><td>'+p.nom+'</td><td>'+p.grupo+'</td></tr>';});
    html+='</tbody></table></div></div>';
  });
  // Zona de envio final: compara declarado vs pegado
  html+='<div style="margin-top:16px;padding-top:14px;border-top:1px solid var(--borde);">';
  // leer lo declarado
  const dec={};let hayDec=false;
  COMIDAS.forEach(m=>{const e=document.getElementById('dec-'+m);dec[m]=e?(parseInt(e.value)||0):0;if(dec[m]>0)hayDec=true;});
  // comparar declarado vs pegado (validos)
  const descuadre=[];
  COMIDAS.forEach(m=>{
    const pegado=(VAL[m]?VAL[m].ok.length:0);
    if(dec[m]!==pegado)descuadre.push({m,dec:dec[m],pegado});
  });
  if(totErr>0){
    html+='<div class="note danger">Corrige la planilla (c&eacute;dulas malas o personal de otra gerencia). Ajusta tu planilla y vuelve a pegar las c&eacute;dulas correctas.</div>';
  }else if(totOk===0){
    html+='<div class="note">Pega al menos un trabajador v&aacute;lido para poder enviar.</div>';
  }else if(!hayDec){
    html+='<div class="note danger">Declara las cantidades (Paso 2) antes de enviar.</div>';
  }else if(descuadre.length>0){
    html+='<div class="note danger"><b>Lo declarado no coincide con las c&eacute;dulas pegadas:</b><ul style="margin:8px 0 0 18px;">';
    descuadre.forEach(d=>{html+='<li>'+d.m+': declaraste <b>'+d.dec+'</b> pero pegaste <b>'+d.pegado+'</b> c&eacute;dulas v&aacute;lidas. Revisa.</li>';});
    html+='</ul></div>';
  }else if(!ESCANER_DATA || !ESCANER_DATA.legible){
    html+='<div class="note danger">Falta el escaner legible (Paso 1).</div>';
  }else{
    html+='<div class="note" style="border-color:var(--verde);margin-bottom:10px;"><b style="color:var(--verde);">Todo cuadra.</b> Escaner legible + declarado = pegado ('+totOk+' comidas). Al enviar, RRHH la revisar&aacute; contra la foto y la aprobar&aacute;.</div>';
    html+='<button class="act prim" onclick="enviarSolicitud()">Verificar y enviar solicitud ('+totOk+' comidas)</button>';
  }
  html+='</div>';
  cont.innerHTML=html;
}

function cargarEscaner(input){
  const file=input.files[0];
  if(!file)return;
  const prev=document.getElementById('escaner-preview');
  prev.innerHTML='<span class="muted">Procesando imagen...</span>';
  if(file.type==='application/pdf'){
    const r=new FileReader();
    r.onload=()=>{ESCANER_DATA={tipo:'pdf',data:r.result,nombre:file.name,legible:true};mostrarPreview();pintarPaso2();};
    r.readAsDataURL(file);
    return;
  }
  const r=new FileReader();
  r.onload=()=>{
    const img=new Image();
    img.onload=()=>{
      // VERIFICAR LEGIBILIDAD: la imagen debe tener resolucion minima
      const anchoMin=800, altoMin=600;
      const legible=(img.width>=anchoMin && img.height>=altoMin);
      const maxW=1000;
      const escala=Math.min(1,maxW/img.width);
      const cw=Math.round(img.width*escala), ch=Math.round(img.height*escala);
      const canvas=document.createElement('canvas');canvas.width=cw;canvas.height=ch;
      const ctx=canvas.getContext('2d');ctx.drawImage(img,0,0,cw,ch);
      const comp=canvas.toDataURL('image/jpeg',0.6);
      ESCANER_DATA={tipo:'img',data:comp,nombre:file.name,legible:legible,anchoOrig:img.width,altoOrig:img.height};
      mostrarPreview();
      pintarPaso2();
    };
    img.onerror=()=>{ESCANER_DATA=null;prev.innerHTML='<div class="note danger">No se pudo leer la imagen. Sube otra.</div>';};
    img.src=r.result;
  };

}

function enviarSolicitud(){
  if(!ESCANER_DATA){alert('Primero sube el escaner de la planilla.');return;}
  // CONTROL DE HORARIO: subida permitida 7:00am - 4:00pm
  const ahora=new Date();
  const hora=ahora.getHours()+ahora.getMinutes()/60;
  const enHorario=(hora>=7 && hora<16);   // 7am a 4pm
  let justificacion=null, fueraDeHorario=false;
  if(!enHorario){
    fueraDeHorario=true;
    const hh=ahora.getHours().toString().padStart(2,'0')+':'+ahora.getMinutes().toString().padStart(2,'0');
    justificacion=prompt('Estas subiendo FUERA del horario permitido (7:00am - 4:00pm). Hora actual: '+hh+'.\n\nEscribe la justificacion del atraso (quedara registrada y la vera RRHH):');
    if(justificacion===null){return;}   // cancelo
    if(!justificacion.trim()){alert('Debes escribir una justificacion para subir fuera de horario.');return;}
  }
  const detalle={};let tot={Desayuno:0,Almuerzo:0,Cena:0};
  COMIDAS.forEach(m=>{
    const r=VAL[m];
    detalle[m]=(r&&r.ok?r.ok.map(p=>p.ced):[]);
    tot[m]=detalle[m].length;
  });
  const dec={};
  COMIDAS.forEach(m=>{const e=document.getElementById('dec-'+m);dec[m]=e?(parseInt(e.value)||0):0;});
  const tipoPlanilla=(document.getElementById('sol-tipo')?document.getElementById('sol-tipo').value:'Personal');
  const registro={
    gerencia:GRUPO,
    fecha:SOL_FECHA,
    tipoPlanilla:tipoPlanilla,
    enviado:new Date().toISOString(),
    porUsuario:(auth.currentUser?auth.currentUser.email:''),
    verificadoPorSolicitante:true,
    estado:'pendiente',
    fueraDeHorario:fueraDeHorario,
    justificacionAtraso:justificacion||null,
    declarado:dec,
    totales:tot,
    detalle:detalle,
    contratasExternas:(GRUPO==='GESTION ADMINISTRATIVA'?CONTRATAS.filter(c=>(c.Desayuno+c.Almuerzo+c.Cena)>0):null),
    escaner:ESCANER_DATA
  };
  // clave: si es parada de molino, se guarda con sufijo para no pisar la solicitud normal
  const claveGer=(tipoPlanilla==='ParadaMolino'?GRUPO+'__ParadaMolino':GRUPO);
  const btn=(typeof event!=='undefined'&&event.target)?event.target:null;
  if(btn){btn.disabled=true;btn.textContent='Enviando...';}
  db.ref('solicitudes/'+SOL_FECHA+'/'+claveGer).set(registro)
    .then(()=>{
      let msg='TODO BIEN \u2014 SOLICITUD ENVIADA\n\nDia: '+fechaBonita(SOL_FECHA)+'\nGerencia: '+GRUPO+'\nDesayunos: '+tot.Desayuno+'  Almuerzos: '+tot.Almuerzo+'  Cenas: '+tot.Cena;
      if(fueraDeHorario)msg+='\n\n\u26a0 Registrada como SUBIDA FUERA DE HORARIO con tu justificacion.';
      msg+='\n\nQueda PENDIENTE de aprobacion por RRHH.\n\nRecuerda llevar la planilla fisica firmada a RRHH/contrata.';
      alert(msg);
      ESCANER_DATA=null;
      CONTRATAS=[];
      limpiarTodas();
      renderSolicitante();
    })
    .catch(e=>{alert('No se pudo enviar: '+e.message);if(btn){btn.disabled=false;btn.textContent='Verificar y enviar solicitud';}});
}

function toggleAuth(ced){if(CUR.excluidos[ced])return;const a={...CUR.auth};if(a[ced])delete a[ced];else a[ced]=true;wAuth(a);}
function authAll(on){const a={...CUR.auth};filtered().forEach(p=>{if(CUR.excluidos[p.ced])return;if(on)a[p.ced]=true;else delete a[p.ced];});wAuth(a);}
function excluir(ced,motivo){if(!motivo)return;const x={...CUR.excluidos};x[ced]=motivo;const a={...CUR.auth};delete a[ced];wExcl(x);wAuth(a);}
function reincorporar(ced){const x={...CUR.excluidos};delete x[ced];wExcl(x);}
function updateAuthResumen(){
  const authN=Object.keys(CUR.auth).length, excN=Object.keys(CUR.excluidos).length;
  const ec=document.getElementById('auth-count');if(ec)ec.textContent='Autorizados: '+authN+'  |  Excluidos: '+excN;
  const by={};
  // Usa filtered() (respeta el filtro del solicitante) en vez de elig() (toda la nomina)
  filtered().forEach(p=>{by[p.ger]=by[p.ger]||{e:0,a:0,x:0};by[p.ger].e++;if(CUR.auth[p.ced])by[p.ger].a++;if(CUR.excluidos[p.ced])by[p.ger].x++;});
  const tb=document.getElementById('auth-resumen');
  if(tb)tb.innerHTML=Object.keys(by).sort().map(g=>'<tr><td>'+g+'</td><td>'+by[g].e+'</td><td><b>'+by[g].a+'</b></td><td class="danger">'+(by[g].x||'')+'</td></tr>').join('');
}

function cargarRanking(){
  const cont=document.getElementById('ranking-resp');
  if(!cont)return;
  const mes=mesActual();
  db.ref('solicitudes').get().then(snap=>{
    const all=snap.val()||{};
    const conteo={};   // gerencia -> {tarde, total}
    Object.keys(all).forEach(fecha=>{
      if(!fecha.startsWith(mes))return;
      Object.keys(all[fecha]).forEach(ger=>{
        const s=all[fecha][ger];if(!s)return;
        const g=s.gerencia||ger;
        conteo[g]=conteo[g]||{tarde:0,total:0};
        conteo[g].total++;
        if(s.fueraDeHorario)conteo[g].tarde++;
      });
    });
    const filas=Object.keys(conteo).map(g=>[g,conteo[g].tarde,conteo[g].total]).filter(r=>r[1]>0).sort((a,b)=>b[1]-a[1]);
    if(filas.length===0){cont.innerHTML='<div class="note" style="border-color:var(--verde);">Ninguna gerencia subio tarde este mes. Todos responsables.</div>';return;}
    let html='<div class="tablewrap"><table><thead><tr><th>Gerencia</th><th>Subidas tarde</th><th>Total subidas</th><th>% tarde</th></tr></thead><tbody>';
    filas.forEach(r=>{const pct=Math.round(r[1]/r[2]*100);html+='<tr><td>'+r[0]+'</td><td style="color:var(--rojo);font-weight:bold;">'+r[1]+'</td><td>'+r[2]+'</td><td>'+pct+'%</td></tr>';});
    html+='</tbody></table></div>';
    cont.innerHTML=html;
  }).catch(e=>{cont.innerHTML='<div class="muted">No se pudo cargar el ranking.</div>';});
}

// ===== CRUCE BIOMETRICO DEL ALMUERZO =====
let BIO_MARCARON=null;   // Set de cedulas que marcaron

function limpiaBio(v){if(v===null||v===undefined)return '';return String(v).replace(/\u00a0/g,'').trim();}

function cargarBiometrico(input){
  const file=input.files[0];
  if(!file)return;
  const cont=document.getElementById('bio-resultado');
  cont.innerHTML='<span class="muted">Leyendo biometrico...</span>';
  const reader=new FileReader();
  reader.onload=(e)=>{
    try{
      const data=new Uint8Array(e.target.result);
      const wb=XLSX.read(data,{type:'array'});
      const ws=wb.Sheets[wb.SheetNames[0]];
      const filas=XLSX.utils.sheet_to_json(ws,{header:1});
      // columna 0 = cedula. Recolectar cedulas que marcaron
      const marcaron=new Set();
      filas.forEach(f=>{
        const ced=limpiaBio(f[0]).replace(/[^0-9]/g,'');
        if(ced && ced.length>=6)marcaron.add(ced);
      });
      BIO_MARCARON=marcaron;

// ---------- RESUMEN DIARIO (formato para el comedor) ----------
let RD_FECHA=null;
// Numero correlativo: 01/07/2026 = 185. Se calcula por dias transcurridos en el año.
function numeroFormato(fecha){
  const [a,m,d]=fecha.split('-').map(Number);
  const base=new Date(2026,6,1);        // 01/07/2026
  const actual=new Date(a,m-1,d);
  if(a===2026){
    const dias=Math.round((actual-base)/(1000*60*60*24));
    return 185+dias;                     // 01/07=185
  }
  // años siguientes: reinicia en 1 el 1 de enero
  const enero=new Date(a,0,1);
  const dias=Math.round((actual-enero)/(1000*60*60*24));
  return 1+dias;
}

// consolida UN dia: personal, contratas, eventuales, seguridad, merienda
function consolidarDia(fecha,cb){
  db.ref('solicitudes/'+fecha).get().then(snap=>{
    const gers=snap.val()||{};
    const personal={Desayuno:0,Almuerzo:0,Cena:0};
    const parada={Desayuno:0,Almuerzo:0,Cena:0};
    const contratas={};
    Object.keys(gers).forEach(g=>{
      const s=gers[g];if(!s||s.estado!=='aprobada')return;
      const exc=s.excluidosAlmuerzo||{};const nExc=Object.keys(exc).length;
      const excC=s.excluidosCena||{};const nExcC=Object.keys(excC).length;
      const D=s.totales.Desayuno||0,A=Math.max(0,(s.totales.Almuerzo||0)-nExc),C=Math.max(0,(s.totales.Cena||0)-nExcC);
      if(s.tipoPlanilla==='ParadaMolino'){parada.Desayuno+=D;parada.Almuerzo+=A;parada.Cena+=C;}
      else{personal.Desayuno+=D;personal.Almuerzo+=A;personal.Cena+=C;}
      if(s.contratasExternas)s.contratasExternas.forEach(ct=>{contratas[ct.nom]=contratas[ct.nom]||{Desayuno:0,Almuerzo:0,Cena:0};contratas[ct.nom].Desayuno+=ct.Desayuno||0;contratas[ct.nom].Almuerzo+=ct.Almuerzo||0;contratas[ct.nom].Cena+=ct.Cena||0;});
    });
    // carga diaria de RRHH (eventuales, seguridad, merienda)
    db.ref('cargadiaria/'+fecha).get().then(cdSnap=>{
      const cd=cdSnap.val()||{};
      const eventuales=cd.eventuales||{Desayuno:0,Almuerzo:0,Cena:0};
      const seguridad=cd.seguridad||{};
      const merienda=cd.merienda||0;
      // subtotal bloque 1 (personal + parada + contratas + eventuales)
      const sub1={Desayuno:personal.Desayuno+parada.Desayuno+eventuales.Desayuno,Almuerzo:personal.Almuerzo+parada.Almuerzo+eventuales.Almuerzo,Cena:personal.Cena+parada.Cena+eventuales.Cena};
      Object.keys(contratas).forEach(n=>{sub1.Desayuno+=contratas[n].Desayuno;sub1.Almuerzo+=contratas[n].Almuerzo;sub1.Cena+=contratas[n].Cena;});
      const sub2={Desayuno:0,Almuerzo:0,Cena:0};
      Object.keys(seguridad).forEach(n=>{sub2.Desayuno+=seguridad[n].Desayuno;sub2.Almuerzo+=seguridad[n].Almuerzo;sub2.Cena+=seguridad[n].Cena;});
      const total={Desayuno:sub1.Desayuno+sub2.Desayuno,Almuerzo:sub1.Almuerzo+sub2.Almuerzo,Cena:sub1.Cena+sub2.Cena};
      cb({personal,parada,contratas,eventuales,seguridad,merienda,sub1,sub2,total});
    });
  });
}

function guardarManual(){
  const ger=(document.getElementById('man-ger')||{}).value;
  const fecha=(document.getElementById('man-fecha')||{}).value;
  const tipo=(document.getElementById('man-tipo')||{}).value;
  const D=parseInt((document.getElementById('man-d')||{}).value)||0;
  const A=parseInt((document.getElementById('man-a')||{}).value)||0;
  const C=parseInt((document.getElementById('man-c')||{}).value)||0;
  if(!ger||!fecha){alert('Elige gerencia y fecha');return;}
  if(D+A+C===0){alert('Indica al menos una comida');return;}
  const claveGer=(tipo==='ParadaMolino'?ger+'__ParadaMolino':ger);
  const guardar=(scan)=>{
    const registro={
      gerencia:ger,fecha:fecha,tipoPlanilla:tipo,
      enviado:new Date().toISOString(),
      porUsuario:(auth.currentUser?auth.currentUser.email:''),
      cargaManualRRHH:true,
      estado:'aprobada',        // aprobada de una vez
      declarado:{Desayuno:D,Almuerzo:A,Cena:C},
      totales:{Desayuno:D,Almuerzo:A,Cena:C},
      detalle:{Desayuno:[],Almuerzo:[],Cena:[]},
      escaner:scan||null
    };
    db.ref('solicitudes/'+fecha+'/'+claveGer).set(registro).then(()=>{alert('Planilla de '+ger+' ('+fecha+') cargada y aprobada.');cargarManuales();}).catch(e=>alert('Error: '+e.message));
  };
  const f=document.getElementById('man-scan');
  if(f&&f.files[0]){
    const file=f.files[0];const r=new FileReader();
    if(file.type==='application/pdf'){r.onload=()=>guardar({tipo:'pdf',data:r.result,nombre:file.name,legible:true});r.readAsDataURL(file);}
    else{
      r.onload=()=>{const img=new Image();img.onload=()=>{const maxW=1000;const esc=Math.min(1,maxW/img.width);const cw=img.width*esc,ch=img.height*esc;const cv=document.createElement('canvas');cv.width=cw;cv.height=ch;cv.getContext('2d').drawImage(img,0,0,cw,ch);guardar({tipo:'img',data:cv.toDataURL('image/jpeg',0.6),nombre:file.name,legible:true});};img.src=r.result;};r.readAsDataURL(file);
    }
  }else{guardar(null);}
}

function cargarManuales(){
  const cont=document.getElementById('man-lista');if(!cont)return;
  const mes=(document.getElementById('man-mes')||{}).value||mesActual();
  db.ref('solicitudes').get().then(snap=>{
    const all=snap.val()||{};
    const filas=[];
    Object.keys(all).forEach(fecha=>{
      if(!fecha.startsWith(mes))return;
      Object.keys(all[fecha]).forEach(g=>{
        const s=all[fecha][g];
        if(s&&s.cargaManualRRHH){filas.push({fecha,clave:g,s});}
      });
    });
    if(filas.length===0){cont.innerHTML='<div class="note">No hay planillas manuales cargadas en '+mes+'.</div>';return;}
    filas.sort((a,b)=>a.fecha<b.fecha?-1:1);
    let html='<div class="tablewrap"><table><thead><tr><th>Fecha</th><th>Gerencia</th><th>Tipo</th><th>Des</th><th>Alm</th><th>Cena</th><th></th></tr></thead><tbody>';
    filas.forEach(f=>{
      const tipo=f.s.tipoPlanilla==='ParadaMolino'?'Parada Molino':'Personal';
      html+='<tr><td>'+f.fecha+'</td><td>'+f.s.gerencia+'</td><td>'+tipo+'</td><td>'+f.s.totales.Desayuno+'</td><td>'+f.s.totales.Almuerzo+'</td><td>'+f.s.totales.Cena+'</td><td><button class="act" style="padding:2px 8px;font-size:11px;background:var(--rojo);color:#fff;" onclick="eliminarManual(\''+f.fecha+'\',\''+f.clave+'\')">Eliminar</button></td></tr>';
    });
    html+='</tbody></table></div>';
    cont.innerHTML=html;
  }).catch(e=>{cont.innerHTML='<div class="note danger">Error: '+e.message+'</div>';});
}

function eliminarManual(fecha,clave){
  if(!confirm('Eliminar esta planilla manual? Podras cargarla de nuevo.'))return;
  db.ref('solicitudes/'+fecha+'/'+clave).remove().then(()=>cargarManuales()).catch(e=>alert('Error: '+e.message));
}

let ENT_FECHA=null, ENT_DATA=[];
function renderEntrega(){
  const v=document.getElementById('view-entrega');

  v.innerHTML='<div class="card"><h2>Entrega de comidas</h2><div class="muted">Cargando '+ENT_FECHA+'...</div></div>';
  // leer todas las solicitudes aprobadas de la fecha, para la comida seleccionada
  db.ref('solicitudes/'+ENT_FECHA).get().then(snap=>{
    const gers=snap.val()||{};
    const personas=[];  // {ced,nom,ger,comida,estado,gerKey}
    Object.keys(gers).forEach(gk=>{
      const s=gers[gk];
      if(!s||s.estado!=='aprobada')return;
      if(!s.detalle)return;
      // detalle tiene arrays por comida: Desayuno, Almuerzo, Cena (cedulas)
      const lista=s.detalle[MEAL]||[];
      const excl=s.excluidosAlmuerzo||{};
      const exclC=s.excluidosCena||{};
      lista.forEach(ced=>{
        // saltar los excluidos de esa comida
        if(MEAL==='Almuerzo' && excl[ced])return;
        if(MEAL==='Cena' && exclC[ced])return;
        const persona=NOMINA.find(p=>normCed(p.ced)===normCed(ced));
        const ent=(s.entrega&&s.entrega[MEAL]&&s.entrega[MEAL][ced])?s.entrega[MEAL][ced]:null;
        personas.push({ced:ced,nom:persona?persona.nom:'(no en nomina)',ger:s.gerencia||gk,gerKey:gk,estado:ent});
      });
    });
    ENT_DATA=personas;
    pintarEntrega();
  }).catch(e=>{v.innerHTML='<div class="card"><div class="note danger">Error: '+e.message+'</div></div>';});
}

function mesActual(){return (document.getElementById('fecha').value||today).slice(0,7);}
function despachadoDia(dayData){
  // dayData: {auth,entregado,eventuales,seguridad} para una comida
  let fijo=0;
  if(dayData && dayData.auth && dayData.entregado){
    Object.keys(dayData.entregado).forEach(ced=>{if(dayData.auth[ced])fijo++;});
  }
  const ev=(dayData&&dayData.eventuales?dayData.eventuales.filter(e=>e&&e.entregado).length:0);
  const seg=(dayData&&dayData.seguridad?ORGANISMOS.reduce((a,o)=>a+(dayData.seguridad[o]||0),0):0);
  return {fijo,ev,seg,total:fijo+ev+seg};
}
function renderCierre(){
  const v=document.getElementById('view-cierre');
  const mes=mesActual();
  v.innerHTML='<div class="card"><h2>Cierre mensual de comidas</h2><div class="muted">Consolidando el mes '+mes+'...</div></div>';
  db.ref('solicitudes').get().then(snap=>{
    const all=snap.val()||{};
    // Categorias del cierre
    const cat={
      'Personal PIM III Choco':{Desayuno:0,Almuerzo:0,Cena:0},
      'Parada de Molino SAG':{Desayuno:0,Almuerzo:0,Cena:0},
      'Eventuales':{Desayuno:0,Almuerzo:0,Cena:0},
      'Contratas externas':{Desayuno:0,Almuerzo:0,Cena:0},
      'Cuerpos de seguridad':{Desayuno:0,Almuerzo:0,Cena:0}
    };
    const contratasDetalle={};   // nombre -> {D,A,C}
    // recorrer todas las fechas del mes
    Object.keys(all).forEach(fecha=>{
      if(!fecha.startsWith(mes))return;
      const gers=all[fecha];
      Object.keys(gers).forEach(claveGer=>{
        const s=gers[claveGer];
        if(!s||s.estado!=='aprobada')return;   // solo aprobadas
        // restar excluidos del almuerzo y de la cena
        const exc=s.excluidosAlmuerzo||{};
        const nExcAlm=Object.keys(exc).length;
        const excC=s.excluidosCena||{};
        const nExcCena=Object.keys(excC).length;
        const D=s.totales.Desayuno||0, A=Math.max(0,(s.totales.Almuerzo||0)-nExcAlm), C=Math.max(0,(s.totales.Cena||0)-nExcCena);
        if(s.tipoPlanilla==='ParadaMolino'){
          cat['Parada de Molino SAG'].Desayuno+=D;cat['Parada de Molino SAG'].Almuerzo+=A;cat['Parada de Molino SAG'].Cena+=C;
        }else{
          cat['Personal PIM III Choco'].Desayuno+=D;cat['Personal PIM III Choco'].Almuerzo+=A;cat['Personal PIM III Choco'].Cena+=C;
        }
        // contratas externas
        if(s.contratasExternas){
          s.contratasExternas.forEach(ct=>{
            cat['Contratas externas'].Desayuno+=ct.Desayuno||0;cat['Contratas externas'].Almuerzo+=ct.Almuerzo||0;cat['Contratas externas'].Cena+=ct.Cena||0;
            contratasDetalle[ct.nom]=contratasDetalle[ct.nom]||{Desayuno:0,Almuerzo:0,Cena:0};
            contratasDetalle[ct.nom].Desayuno+=ct.Desayuno||0;contratasDetalle[ct.nom].Almuerzo+=ct.Almuerzo||0;contratasDetalle[ct.nom].Cena+=ct.Cena||0;
          });
        }
      });
    });
    // acumular la carga diaria de RRHH de todo el mes (eventuales, seguridad, merienda)
    db.ref('cargadiaria').get().then(cdSnap=>{
      const cd=cdSnap.val()||{};
      const extra={eventuales:{Desayuno:0,Almuerzo:0,Cena:0},seguridad:{},merienda:0,isidora:{Desayuno:0,Almuerzo:0,Cena:0}};
      const desglose=[];   // por dia
      Object.keys(cd).forEach(fecha=>{
        if(!fecha.startsWith(mes))return;
        const d=cd[fecha];
        if(d.eventuales){extra.eventuales.Desayuno+=d.eventuales.Desayuno||0;extra.eventuales.Almuerzo+=d.eventuales.Almuerzo||0;extra.eventuales.Cena+=d.eventuales.Cena||0;}
        if(d.merienda)extra.merienda+=d.merienda||0;
        if(d.seguridad){Object.keys(d.seguridad).forEach(nom=>{extra.seguridad[nom]=extra.seguridad[nom]||{Desayuno:0,Almuerzo:0,Cena:0};extra.seguridad[nom].Desayuno+=d.seguridad[nom].Desayuno||0;extra.seguridad[nom].Almuerzo+=d.seguridad[nom].Almuerzo||0;extra.seguridad[nom].Cena+=d.seguridad[nom].Cena||0;});}
        desglose.push({fecha,d});
      });
      // Isidora se lee del cierre-extra (lo teclea RRHH una vez, es un resumen mensual)
      db.ref('cierre-extra/'+mes).get().then(exSnap=>{
        const ex=exSnap.val()||{};
        if(ex.isidora)extra.isidora=ex.isidora;
        pintarCierre(v,mes,cat,contratasDetalle,extra,desglose);
      });
    });
  }).catch(e=>{v.innerHTML='<div class="card"><div class="note danger">Error al consolidar: '+e.message+'</div></div>';});
}

function pintarCierre(v,mes,cat,contratasDetalle,extra,desglose){
  const esRRHH=(ROLE==='RRHH');
  // sumar eventuales y seguridad manuales
  const ev=extra.eventuales||{Desayuno:0,Almuerzo:0,Cena:0};
  cat['Eventuales'].Desayuno=ev.Desayuno||0;cat['Eventuales'].Almuerzo=ev.Almuerzo||0;cat['Eventuales'].Cena=ev.Cena||0;
  const seg=extra.seguridad||{};
  let segT={Desayuno:0,Almuerzo:0,Cena:0};
  Object.keys(seg).forEach(nom=>{segT.Desayuno+=seg[nom].Desayuno||0;segT.Almuerzo+=seg[nom].Almuerzo||0;segT.Cena+=seg[nom].Cena||0;});
  cat['Cuerpos de seguridad']=segT;
  const merienda=extra.merienda||0;
  const isi=extra.isidora||{Desayuno:0,Almuerzo:0,Cena:0};

  // totales Choco
  let totCH={Desayuno:0,Almuerzo:0,Cena:0};
  Object.keys(cat).forEach(k=>{totCH.Desayuno+=cat[k].Desayuno;totCH.Almuerzo+=cat[k].Almuerzo;totCH.Cena+=cat[k].Cena;});
  // total general (Choco + Isidora)
  const gD=totCH.Desayuno+(isi.Desayuno||0), gA=totCH.Almuerzo+(isi.Almuerzo||0), gC=totCH.Cena+(isi.Cena||0);

  let html='<div class="card"><h2>Cierre mensual &mdash; '+mes+'</h2><div class="muted">Consolidado de comidas del mes (solo solicitudes aprobadas). Choco se calcula del sistema; Isidora, eventuales, seguridad y merienda los carga RRHH.</div>';

  html+='<div class="kpi"><div class="l">Desayunos (Choco+Isidora)</div><div class="v">'+gD+'</div></div>';
  html+='<div class="kpi"><div class="l">Almuerzos</div><div class="v">'+gA+'</div></div>';
  html+='<div class="kpi"><div class="l">Cenas</div><div class="v">'+gC+'</div></div>';
  html+='<div class="kpi" style="background:var(--azulbg);"><div class="l" style="color:var(--azul)">Merienda Nocturna</div><div class="v" style="color:var(--azul)">'+merienda+'</div></div>';
  html+='</div>';

  // tabla Resumen de Comensales Choco con 3 subtotales (como el formato oficial)

  // Bloque 1: personal PIM + eventuales + parada molino (solo los que tengan datos, personal siempre)
  let sub1={Desayuno:0,Almuerzo:0,Cena:0};
  html+='<tr><td>Personal PIM III Choco</td><td>'+cat['Personal PIM III Choco'].Desayuno+'</td><td>'+cat['Personal PIM III Choco'].Almuerzo+'</td><td>'+cat['Personal PIM III Choco'].Cena+'</td></tr>';
  sub1.Desayuno+=cat['Personal PIM III Choco'].Desayuno;sub1.Almuerzo+=cat['Personal PIM III Choco'].Almuerzo;sub1.Cena+=cat['Personal PIM III Choco'].Cena;
  ['Eventuales','Parada de Molino SAG'].forEach(k=>{
    const t=cat[k].Desayuno+cat[k].Almuerzo+cat[k].Cena;
    if(t>0){html+='<tr><td>'+k+'</td><td>'+cat[k].Desayuno+'</td><td>'+cat[k].Almuerzo+'</td><td>'+cat[k].Cena+'</td></tr>';}
    sub1.Desayuno+=cat[k].Desayuno;sub1.Almuerzo+=cat[k].Almuerzo;sub1.Cena+=cat[k].Cena;
  });
  html+='<tr style="background:#fff3e0;font-weight:bold;"><td>SUBTOTAL</td><td>'+sub1.Desayuno+'</td><td>'+sub1.Almuerzo+'</td><td>'+sub1.Cena+'</td></tr>';
  // Bloque 2: contratas nombradas una por una

  const nomsCont=Object.keys(contratasDetalle);
  if(nomsCont.length>0){
    nomsCont.forEach(n=>{const c=contratasDetalle[n];html+='<tr><td>'+n+'</td><td>'+c.Desayuno+'</td><td>'+c.Almuerzo+'</td><td>'+c.Cena+'</td></tr>';sub2.Desayuno+=c.Desayuno;sub2.Almuerzo+=c.Almuerzo;sub2.Cena+=c.Cena;});
    html+='<tr style="background:#e3f2fd;font-weight:bold;"><td>SUBTOTAL CONTRATAS</td><td>'+sub2.Desayuno+'</td><td>'+sub2.Almuerzo+'</td><td>'+sub2.Cena+'</td></tr>';
  }
  // Bloque 3: cuerpos de seguridad nombrados
  let sub3={Desayuno:0,Almuerzo:0,Cena:0};
  const nomsSeg=Object.keys(seg);
  if(nomsSeg.length>0){
    nomsSeg.forEach(n=>{const c=seg[n];html+='<tr><td>'+n+'</td><td>'+c.Desayuno+'</td><td>'+c.Almuerzo+'</td><td>'+c.Cena+'</td></tr>';sub3.Desayuno+=c.Desayuno;sub3.Almuerzo+=c.Almuerzo;sub3.Cena+=c.Cena;});

  // Resumen Mina Isidora (desglosado, del formato que teclea RRHH)

  grupo2.forEach(c=>{const v=iDesg[c]||{Desayuno:0,Almuerzo:0,Cena:0};html+='<tr><td>'+c+'</td><td>'+v.Desayuno+'</td><td>'+v.Almuerzo+'</td><td>'+v.Cena+'</td></tr>';isiSub2.Desayuno+=v.Desayuno;isiSub2.Almuerzo+=v.Almuerzo;isiSub2.Cena+=v.Cena;});

  html+='<tr style="background:var(--azulbg);font-weight:bold;font-size:15px;"><td>TOTAL GENERAL ISIDORA</td><td>'+(isi.Desayuno||0)+'</td><td>'+(isi.Almuerzo||0)+'</td><td>'+(isi.Cena||0)+'</td></tr>';

  // Resumen Isidora + Solicitud de Pedido (suma de ambos)
  html+='<div class="card"><h2>Solicitud de Pedido consolidada (Choco + Isidora)</h2><div class="muted">La sorpe: suma del Resumen de Choco (sistema) + el Resumen de Isidora (tecleado por RRHH).</div><div class="tablewrap"><table><thead><tr><th>Concepto</th><th>Cantidad</th></tr></thead><tbody>';
  html+='<tr><td>Desayunos Planta Choco</td><td>'+totCH.Desayuno+'</td></tr>';
  html+='<tr><td>Almuerzos Planta Choco</td><td>'+totCH.Almuerzo+'</td></tr>';
  html+='<tr><td>Cenas Planta Choco</td><td>'+totCH.Cena+'</td></tr>';
  html+='<tr><td>Desayunos Mina Isidora</td><td>'+(isi.Desayuno||0)+'</td></tr>';
  html+='<tr><td>Almuerzos Mina Isidora</td><td>'+(isi.Almuerzo||0)+'</td></tr>';
  html+='<tr><td>Cenas Mina Isidora</td><td>'+(isi.Cena||0)+'</td></tr>';
  html+='<tr><td>Merienda Nocturna (servida en Mina)</td><td>'+merienda+'</td></tr>';
  html+='<tr style="background:#e8f5e9;font-weight:bold;"><td>TOTAL GENERAL DE COMIDAS</td><td>'+(gD+gA+gC+merienda)+'</td></tr>';
  html+='</tbody></table></div></div>';

  // panel de Isidora (RRHH teclea el desglose segun formato de Isidora)
  if(esRRHH){
    const iD=extra.isidoraDesglose||{};
    const catsIsi=['Personal PIM III Mina Isidora','Personal CVM','Eventual','GPAMO','DGCIM'];

}

function subirLogo(input){
  const f=input.files[0];if(!f)return;
  const r=new FileReader();
  r.onload=()=>{db.ref('config/logo').set(r.result).then(()=>{document.getElementById('logo-estado').innerHTML='<span style="color:var(--verde);">Logo guardado</span>';}).catch(e=>alert('Error: '+e.message));};
  r.readAsDataURL(f);
}

// Limpieza de escaneres del mes: borra solo las imagenes, deja los totales intactos
function limpiarEscaneres(mes){
  if(!confirm('Seguro que quieres borrar los escaneres de las planillas de '+mes+'?\n\nLos totales y el cierre NO se borran, solo las imagenes. Esto no se puede deshacer.'))return;
  db.ref('solicitudes').get().then(snap=>{
    const all=snap.val()||{};
    const updates={};
    let n=0;
    Object.keys(all).forEach(fecha=>{
      if(!fecha.startsWith(mes))return;
      Object.keys(all[fecha]).forEach(ger=>{
        if(all[fecha][ger] && all[fecha][ger].escaner){
          updates['solicitudes/'+fecha+'/'+ger+'/escaner']=null;n++;
        }
      });
    });
    // tambien el escaner de isidora
    updates['cierre-extra/'+mes+'/isidoraEscaner']=null;
    if(n===0){alert('No hay escaneres para borrar en '+mes+'.');return;}
    db.ref().update(updates).then(()=>{alert('Se borraron '+n+' escaneres de '+mes+'. Los totales quedan intactos.');renderCierre();}).catch(e=>alert('Error: '+e.message));
  });
}

// nombre bonito del mes
function mesNombre(mes){
  const [a,m]=mes.split('-');
  const nombres=['','ENERO','FEBRERO','MARZO','ABRIL','MAYO','JUNIO','JULIO','AGOSTO','SEPTIEMBRE','OCTUBRE','NOVIEMBRE','DICIEMBRE'];
  return nombres[parseInt(m)]+' '+a;
}

function guardarIsidora(mes){
  const catsIsi=['Personal PIM III Mina Isidora','Personal CVM','Eventual','GPAMO','DGCIM'];
  const desglose={};let tot={Desayuno:0,Almuerzo:0,Cena:0};
  catsIsi.forEach(c=>{
    const id=c.replace(/[^A-Za-z]/g,'');
    const d=parseInt((document.getElementById('isi-'+id+'-d')||{}).value)||0;
    const a=parseInt((document.getElementById('isi-'+id+'-a')||{}).value)||0;
    const ce=parseInt((document.getElementById('isi-'+id+'-c')||{}).value)||0;
    desglose[c]={Desayuno:d,Almuerzo:a,Cena:ce};
    tot.Desayuno+=d;tot.Almuerzo+=a;tot.Cena+=ce;
  });
  const guardar=(scan)=>{
    const obj={isidora:tot,isidoraDesglose:desglose};if(scan)obj.isidoraEscaner=scan;
    db.ref('cierre-extra/'+mes).update(obj).then(()=>{alert('Resumen de Isidora guardado.');renderCierre();}).catch(e=>alert('Error: '+e.message));
  };
  const f=document.getElementById('ex-isi-scan');
  if(f&&f.files[0]){
    const file=f.files[0];const r=new FileReader();
    r.onload=()=>guardar({tipo:file.type==='application/pdf'?'pdf':'img',data:r.result,nombre:file.name});
    r.readAsDataURL(file);
  }else{guardar(null);}
}

function onPersonalFiltro(){PERSONAL_FILTRO_GRUPO=document.getElementById('pf-grupo').value;renderPersonal();}
function onPersonalBusca(){PERSONAL_BUSQUEDA=document.getElementById('pf-busca').value;const c=document.getElementById('pf-busca').selectionStart;renderPersonal();const el=document.getElementById('pf-busca');if(el){el.focus();el.setSelectionRange(c,c);}}

function ingresarTrabajador(){
  const ced=(document.getElementById('ni-ced').value||'').replace(/\D/g,'');
  const nom=(document.getElementById('ni-nom').value||'').trim().toUpperCase();
  const grupo=document.getElementById('ni-grupo').value;
  const rot=(document.getElementById('ni-rot').value||'').trim().toUpperCase()||'ADM';
  const planta=document.getElementById('ni-planta').value;
  const mask=parseInt(document.getElementById('ni-mask').value,10);
  const msg=document.getElementById('ni-msg');
  if(!ced||ced.length<6){msg.innerHTML='<span style="color:#c00000;">Cedula invalida.</span>';return;}
  if(!nom){msg.innerHTML='<span style="color:#c00000;">Falta el nombre.</span>';return;}
  // verificar que no exista ya
  db.ref('nomina/'+ced).get().then(snap=>{
    if(snap.exists() && snap.val().activo!==false){
      msg.innerHTML='<span style="color:#c00000;">Ya existe un trabajador activo con esa cedula: '+snap.val().nom+'</span>';
      return;
    }
    const tipo=rot.split(' ')[0];
    const reg={nom:nom,grupo:grupo,rot:rot,tipo:tipo,planta:planta,mask:mask,activo:true};
    db.ref('nomina/'+ced).set(reg).then(()=>{
      msg.innerHTML='<span style="color:#059669;">Ingresado: '+nom+' en '+grupo+'.</span>';
      // limpiar campos
      document.getElementById('ni-ced').value='';document.getElementById('ni-nom').value='';document.getElementById('ni-rot').value='';
      cargarNomina().then(()=>{gerOptions();renderPersonal();});
    }).catch(e=>{msg.innerHTML='<span style="color:#c00000;">Error: '+e.message+'</span>';});
  });
}

function egresarTrabajador(ced,nom){
  if(!confirm('Egresar a '+nom+' (cedula '+ced+')?\n\nDesaparecera de todas las listas de inmediato. Queda un respaldo interno por si hay reingreso o error.'))return;
  // respaldo invisible: mover a egresados/ con fecha y quien
  db.ref('nomina/'+ced).get().then(snap=>{
    if(!snap.exists()){alert('No se encontro ese trabajador.');return;}
    const data=snap.val();
    data.egresado_por=(auth.currentUser&&auth.currentUser.email)||'RRHH';
    data.egresado_fecha=new Date().toISOString();
    // guardar respaldo y eliminar de nomina activa
    db.ref('egresados/'+ced).set(data).then(()=>{
      db.ref('nomina/'+ced).remove().then(()=>{
        cargarNomina().then(()=>{gerOptions();renderPersonal();});
      });
    }).catch(e=>alert('Error al egresar: '+e.message));
  });
}

function guardarCierre(){
  const mes=mesActual();
  db.ref('dias').get().then(snap=>{
    const all=snap.val()||{auth:{},entregado:{},obs:{},eventuales:[],seguridad:{},excluidos:{}};const tot={Desayuno:0,Almuerzo:0,Cena:0};let dias=new Set();
    Object.keys(all).forEach(k=>{const us=k.lastIndexOf('_');const fecha=k.slice(0,us);const m=k.slice(us+1);if(!fecha.startsWith(mes))return;dias.add(fecha);tot[m]=(tot[m]||0)+despachadoDia(all[k]).total;});
    if(dias.size===0){alert('No hay datos para cerrar en '+mes);return;}
    const gtot=tot.Desayuno+tot.Almuerzo+tot.Cena;
    db.ref('cierres/'+mes).set({mes,desayuno:tot.Desayuno,almuerzo:tot.Almuerzo,cena:tot.Cena,total:gtot,dias:dias.size,guardado:new Date().toISOString()})
      .then(()=>{alert('Cierre de '+mes+' guardado en el historico.');renderHistorico();})
      .catch(()=>alert('No se pudo guardar (revisa permisos / conexion).'));
  });
}
function renderHistorico(){
  const el=document.getElementById('hist');if(!el)return;
  db.ref('cierres').get().then(snap=>{
    const c=snap.val()||{auth:{},entregado:{},obs:{},eventuales:[],seguridad:{},excluidos:{}};const meses=Object.keys(c).sort().reverse();
    if(meses.length===0){el.innerHTML='<div class="muted" style="padding:10px;">Aun no hay cierres guardados.</div>';return;}
    let html='<table><thead><tr><th>Mes</th><th>Desayunos</th><th>Almuerzos</th><th>Cenas</th><th>Total general</th><th>Dias</th></tr></thead><tbody>';
    meses.forEach(m=>{const x=c[m];html+='<tr><td><b>'+m+'</b></td><td>'+x.desayuno+'</td><td>'+x.almuerzo+'</td><td>'+x.cena+'</td><td><b>'+x.total+'</b></td><td>'+x.dias+'</td></tr>';});
    html+='</tbody></table>';
    el.innerHTML=html;
  });
}

  XLSX.utils.book_append_sheet(wb,ws,'Cierre '+p.mes);XLSX.writeFile(wb,'Cierre_Mensual_'+p.mes+'.xlsx');
}
